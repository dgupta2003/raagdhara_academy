runConfig:
  minInstances: 0
  maxInstances: 10

env:
  # Public Firebase config — safe to commit, these are embedded in the client bundle anyway
  # Fill these in from your .env.local
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDMPkct3RgtfBh88X7P4HVA7f_NiWHl8ng
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: raagdhara-academy.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: raagdhara-academy
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: raagdhara-academy.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: 519189304040
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:519189304040:web:514eb8a1924e00a7e2af5d
    availability:
      - BUILD
      - RUNTIME

  # Non-sensitive server vars — plain values are fine
  - variable: FIREBASE_PROJECT_ID
    value: raagdhara-academy
    availability:
      - RUNTIME

  - variable: ADMIN_EMAIL
    value: raagdharamusic@gmail.com
    availability:
      - RUNTIME

  # Private secrets — stored in Google Cloud Secret Manager
  # Set these with: firebase apphosting:secrets:set SECRET_NAME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_RAZORPAY_KEY_ID
    value: rzp_test_SfomEbCKFumcdN
    availability:
      - BUILD
      - RUNTIME

  - variable: RAZORPAY_KEY_SECRET
    secret: RAZORPAY_KEY_SECRET
    availability:
      - RUNTIME
